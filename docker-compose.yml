services:
  web:
    build: .
    command: gunicorn --bind 0.0.0.0:8000 portfolio_backend.wsgi:application
    volumes:
      - ./:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - sqlite_data:/app/db.sqlite3
    expose:
      - 8000
    env_file:
      - .env
    restart: always

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - web
    restart: always

volumes:
  static_volume:
  media_volume:
  sqlite_data:

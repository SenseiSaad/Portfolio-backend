version: '3.9'

services:
  web:
    build: .
    expose:
      - 8000
    env_file:
      - .env
    volumes:
      - static_volume:/app/staticfiles
    restart: always
    networks:
      - app_network

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - web
    restart: on-failure
    networks:
      - app_network

volumes:
  static_volume:

networks:
  app_network:
    driver: bridge